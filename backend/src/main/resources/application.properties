spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/bank_db
spring.datasource.username=bankuser
spring.datasource.password=bankpassword

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration=86400000

# Redis Cache Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=60000

# Mail Configuration (Mailtrap or any SMTP)
# Set axiom.mail.enabled=true and configure below to activate real emails
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=your_mailtrap_username
spring.mail.password=your_mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Axiom Custom Properties
axiom.mail.enabled=false
axiom.mail.admin-email=admin@axiombank.com

# Async support for event-driven processing
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
